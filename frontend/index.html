<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docker Soutenance</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        ul { list-style: none; padding: 0; }
        li { background: #f4f4f4; margin: 0.5rem; padding: 0.5rem 1rem; border-radius: 4px; }
        .input-group { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>Task Manager</h1>
    <div class="input-group">
        <input type="text" id="itemName" placeholder="Enter task name">
        <button onclick="addItem()">Add Task</button>
    </div>
    <ul id="itemList"></ul>

    <script>
        const API_URL = '/api/items';

        async function fetchItems() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error('Failed to fetch items');
                const items = await res.json();
                const list = document.getElementById('itemList');
                list.innerHTML = '';
                if (Array.isArray(items)) {
                    items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item.name;
                        list.appendChild(li);
                    });
                }
            } catch (err) {
                console.error('Error fetching items:', err);
                const list = document.getElementById('itemList');
                list.innerHTML = '<li style="color: red">Error loading tasks. Please try again later.</li>';
            }
        }

        async function addItem() {
            const input = document.getElementById('itemName');
            const name = input.value;
            if (!name) return;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (!res.ok) throw new Error('Failed to add item');
                input.value = '';
                fetchItems();
            } catch (err) {
                console.error('Error adding item:', err);
                alert('Failed to add task. See console for details.');
            }
        }

        fetchItems();
    </script>
</body>
</html>
